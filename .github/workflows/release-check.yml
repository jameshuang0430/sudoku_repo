name: CI Smoke Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-smoke-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-gate:
    name: Smoke Gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install matplotlib

      - name: Show runtime versions
        run: |
          python --version
          python -c "import torch, matplotlib; print(f'torch={torch.__version__}'); print(f'matplotlib={matplotlib.__version__}')"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Train smoke checkpoint
        run: >
          python -m ai.train
          --epochs 1
          --train-size 64
          --val-size 16
          --batch-size 16
          --blanks 40
          --checkpoint ai/checkpoints/ci_smoke.pt
          --best-checkpoint ai/checkpoints/ci_smoke.best.pt
          --metrics-output ai/reports/ci_smoke_metrics.json

      - name: Run CI smoke gate
        run: >
          python -m ai.release_check
          --checkpoint ai/checkpoints/ci_smoke.best.pt
          --dataset-size 16
          --batch-size 8
          --benchmark-max-samples 16
          --benchmark-warmup-batches 0
          --benchmark-repeats 1
          --skip-tests
          --min-production-fast-solved-rate 0.0
          --min-production-pure-solved-rate 0.0
          --min-research-raw-blank-cell-accuracy 0.0
          --max-production-fast-board-ms 500.0
          --max-production-pure-board-ms 500.0
          --report ai/reports/ci_release_check.json

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## CI Smoke Gate"
            echo
            echo "- Workflow: automated per-PR and per-main-push smoke gate"
            echo "- Checkpoint: \`ai/checkpoints/ci_smoke.best.pt\`"
            echo "- Report: \`ai/reports/ci_release_check.json\`"
            echo "- Full production gate: still manual, because the production checkpoint is not tracked in git"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-gate-artifacts
          path: |
            ai/reports/ci_smoke_metrics.json
            ai/reports/ci_release_check.json
